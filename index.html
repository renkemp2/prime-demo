  <div class="grid2" style="margin-top:16px"><div class="card-section"><div style="font-size:11px;font-weight:700;color:var(--gold);margin-bottom:10px">COST</div><div style="font-size:11px;font-weight:700;color:var(--gold)">~$9.50/mo</div><div style="font-size:9px;color:var(--t3);margin-top:4px">19 workflows · 30 tables · 37 help · 32 NAICS</div></div><div class="card-section"><div style="font-size:11px;font-weight:700;color:var(--cyan);margin-bottom:10px">API HEALTH</div>${[{n:'SAM.gov (Opps+Entity)'},{n:'USAspending'},{n:'SBA Dynamic'},{n:'DIBBS'},{n:'Congress.gov'},{n:'GAO.gov'},{n:'CPARS.gov'},{n:'Anthropic'},{n:'SendGrid'}].map((a,i)=>'<div style="display:flex;justify-content:space-between;padding:2px 0;'+(i<8?'border-bottom:1px solid var(--bd)':'')+'"><span style="font-size:9px;color:var(--t2)">'+a.n+'</span><span style="width:6px;height:6px;border-radius:99px;background:var(--green)"></span></div>').join('')}</div></div>
</div>

<!-- HELP -->
<div class="tab" id="t-help" style="display:none">
  <div style="font-size:16px;font-weight:700;margin-bottom:6px">❓ Help & FAQ</div>
  <div style="font-size:10px;color:var(--t3);margin-bottom:16px">23 entries · Auto-updated by agents · Search any term</div>
  <input type="text" class="help-search" id="help-search" placeholder="Search any term, alert, or feature..." oninput="filterHelp()">
  ${HELP.map(h=>'<div class="help-item" data-term="'+h.term+'" data-cat="'+h.cat+'" data-text="'+h.a+'" onclick="toggleHelp(this)"><div class="help-q"><span class="help-cat" style="background:'+h.cc+'18;color:'+h.cc+'">'+h.cat+'</span>'+h.term+'<span style="font-size:9px;color:var(--t3);margin-left:8px">'+h.ag+'</span></div><div class="help-a">'+h.a+'</div></div>').join('')}
</div>
`;

renderGrid(document.getElementById('c-map'),CS,'construction');

function tk(){const n=new Date(),D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],p=x=>String(x).padStart(2,'0');const el=document.getElementById('clk');if(el)el.textContent=D[n.getDay()]+' '+M[n.getMonth()]+' '+n.getDate()+' · '+p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds())+' CT';}
tk();setInterval(tk,1000);
</script>
