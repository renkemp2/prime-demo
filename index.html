<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06080F;--panel:#0B0F1A;--card:#0F1424;--cardHi:#131B30;--bd:rgba(255,255,255,.06);--t1:#EDF0F7;--t2:#8B95AB;--t3:#4D5669;--gold:#E9C46A;--goldDim:rgba(233,196,106,.12);--goldBd:rgba(233,196,106,.25);--cyan:#00E5FF;--cyanDim:rgba(0,229,255,.10);--cyanBd:rgba(0,229,255,.25);--green:#34D399;--greenDim:rgba(52,211,153,.10);--greenBd:rgba(52,211,153,.25);--red:#F87171;--redDim:rgba(248,113,113,.10);--amber:#F59E0B;--amberDim:rgba(245,158,11,.10);--violet:#A78BFA;--violetDim:rgba(167,139,250,.10);--steel:#64748B}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;display:flex}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:99px}
.ambient{position:fixed;inset:0;pointer-events:none;background:radial-gradient(900px 500px at 70% -10%,var(--cyanDim),transparent 60%),radial-gradient(700px 400px at 10% 110%,var(--goldDim),transparent 60%);z-index:0}
.sb{width:220px;background:rgba(8,11,20,.85);backdrop-filter:blur(12px);border-right:1px solid var(--bd);padding:16px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;flex-shrink:0;z-index:1}
.sb-logo{padding:8px 12px 20px;display:flex;align-items:center;gap:10px}
.sb-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--gold),#8B6914);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff}
.sb-title{font-weight:800;font-size:15px}.sb-title span{color:var(--gold)}
.sb-ver{font-size:8px;color:var(--t3);letter-spacing:.14em;text-transform:uppercase;margin-top:1px}
.sb-group{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.16em;padding:12px 12px 4px;text-transform:uppercase}
.sb-btn{display:flex;align-items:center;gap:10px;width:100%;padding:8px 12px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:var(--t2);font-size:12px;font-family:'Outfit',sans-serif;font-weight:400;text-align:left;transition:all .15s}
.sb-btn:hover{background:rgba(255,255,255,.03)}.sb-btn.active{background:var(--cyanDim);color:var(--cyan);font-weight:600}
.sb-dot{width:6px;height:6px;border-radius:99px;margin-left:auto}
.sb-foot{margin-top:auto;padding:16px 12px 8px;font-size:9px;color:var(--t3);line-height:1.6;border-top:1px solid var(--bd)}
.main{flex:1;overflow-y:auto;padding:20px 24px 40px;z-index:1}.tab{display:none}.tab.active{display:block}
.badge{font-size:9px;font-weight:700;letter-spacing:.08em;padding:2px 7px;border-radius:4px;text-transform:uppercase;white-space:nowrap;display:inline-block}
.kpi-row{display:flex;gap:10px;flex-wrap:wrap}
.kpi{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;flex:1;min-width:130px}
.kpi-val{font-size:22px;font-weight:800}.kpi-lbl{font-size:10px;color:var(--t2);margin-top:2px}.kpi-sub{font-size:9px;color:var(--t3);margin-top:3px}
.opp{display:grid;grid-template-columns:minmax(0,1fr) 70px 80px 110px 65px;gap:8px;align-items:center;padding:10px 14px;background:var(--card);border:1px solid var(--bd);border-radius:8px;transition:border-color .15s;cursor:pointer;margin-bottom:6px}.opp:hover{border-color:var(--cyan)}
.feed{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:14px;max-height:420px;overflow-y:auto}
.feed-item{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}.feed-item:last-child{border-bottom:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.card-section{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:16px}
.bar{height:4px;background:var(--bd);border-radius:99px;overflow:hidden;margin-top:6px}.bar-fill{height:100%;border-radius:99px}
.alert{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;margin-bottom:6px}
.pill{padding:6px 12px;border-radius:6px;font-size:10px;font-weight:600;display:inline-block}
.bid-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border:1px solid var(--bd);border-radius:8px;margin-bottom:6px}
.comp-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--bd);border-radius:8px;margin-bottom:6px}
.comp-dot{width:8px;height:8px;border-radius:99px;flex-shrink:0}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:3px}
.stile{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:5px;padding:6px 5px;cursor:pointer;text-align:center;min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:border-color .15s;position:relative}
.stile:hover{border-color:var(--goldBd);background:var(--cardHi)}.stile.hot{border-color:rgba(52,211,153,.55)}.stile.dim{opacity:.35}
.stile .hpb{position:absolute;top:2px;right:2px;font-size:5px;font-weight:900;padding:1px 3px;border-radius:1px}
.reg-lbl{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;padding:6px 2px 2px;border-top:1px solid var(--bd);margin-top:4px}
.state-detail{background:var(--card);border:1px solid var(--goldBd);border-radius:8px;padding:16px;margin-top:12px}
.cong-item{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-bottom:8px;border-left:3px solid var(--amber)}
.cong-impact{margin-top:8px;padding:10px 12px;border-radius:6px;font-size:11px;line-height:1.5}
.co-row{display:flex;align-items:center;gap:8px;padding:6px 0}
.agent-card{background:var(--card);border-radius:8px;padding:12px 14px}
.money-card{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:16px;margin-bottom:10px}
.money-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.help-item{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.help-item:hover{border-color:var(--cyanBd)}
.help-q{font-size:12px;font-weight:600;margin-bottom:6px}.help-a{font-size:11px;color:var(--t2);line-height:1.6;display:none}
.help-item.open .help-a{display:block}.help-item.open{border-color:var(--goldBd)}
.help-search{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--card);color:var(--t1);font-family:'Outfit',sans-serif;font-size:13px;outline:none;margin-bottom:16px}
.help-search:focus{border-color:var(--cyanBd)}
.help-cat{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600;margin-right:6px}
.growth-card{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-bottom:8px}
.growth-status{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:9px;font-weight:700}
@media(max-width:900px){.sb{display:none}.main{padding:12px}.sgrid{grid-template-columns:repeat(auto-fill,minmax(52px,1fr))}}
</style>
</head>

function go(id){TABS.forEach(t=>{const el=document.getElementById('t-'+t);if(el)el.style.display=t===id?'block':'none'});document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));if(event&&event.target)event.target.closest('.sb-btn').classList.add('active');}
function sc(s){return s>=85?'var(--green)':s>=70?'var(--gold)':s>=55?'var(--amber)':'var(--red)';}
function rb(r){const m={'STRONG BID':{bg:'var(--greenDim)',c:'var(--green)',i:'✅'},'BID':{bg:'var(--cyanDim)',c:'var(--cyan)',i:'✅'},'CONDITIONAL':{bg:'var(--amberDim)',c:'var(--amber)',i:'⚠️'},'NO BID':{bg:'var(--redDim)',c:'var(--red)',i:'❌'}};const s=m[r]||m['BID'];return '<span class="badge" style="background:'+s.bg+';color:'+s.c+'">'+s.i+' '+r+'</span>';}
function fmt(v){return v>=1e6?'$'+(v/1e6).toFixed(1)+'M':'$'+(v/1000).toFixed(0)+'K';}

const COPPS=[{t:'VA Slidell Clinic Renovation',a:'VA',n:'236220',sa:'SDB',v:2400000,s:91,r:'STRONG BID',d:22},{t:'NAVFAC Federal City Electrical',a:'NAVFAC',n:'238210',sa:'SB',v:1400000,s:88,r:'STRONG BID',d:18},{t:'GSA Leake Ave Landscaping',a:'GSA',n:'561730',sa:'SDB',v:680000,s:86,r:'BID',d:26},{t:'Keesler Housing (12 units)',a:'Air Force',n:'236116',sa:'SB',v:3200000,s:74,r:'CONDITIONAL',d:28},{t:'NPS Barataria Boardwalk',a:'Interior',n:'237990',sa:'Full & Open',v:890000,s:58,r:'NO BID',d:15}];
const SOPPS=[{t:'Diesel Fuel-NAS JRB',a:'DLA',c:'fuel',sa:'SB',v:340000,s:94,r:'STRONG BID',d:30,rc:'Annual IDIQ',src:'DIBBS'},{t:'Janitorial Paper-VA Med',a:'VA',c:'janitorial',sa:'SDB',v:87000,s:91,r:'STRONG BID',d:21,rc:'Quarterly BPA',src:'SAM'},{t:'PPE Gloves-USACE NOLA',a:'USACE',c:'ppe',sa:'SB',v:24000,s:88,r:'BID',d:9,rc:'As-Needed',src:'DIBBS'},{t:'Office Supplies-Hale Boggs',a:'GSA',c:'office',sa:'SDB',v:18500,s:82,r:'BID',d:35,rc:'Monthly PO',src:'SAM'},{t:'Break Room-Ft Polk',a:'Army',c:'food',sa:'SB',v:12000,s:76,r:'CONDITIONAL',d:14,rc:'Quarterly',src:'SAM'}];
const CONGRESS=[{bill:'H.R. 4583 — FY2026 Military Construction & VA Appropriations',status:'SIGNED INTO LAW',date:'Apr 12, 2026',amount:'$14.2B',sc:'var(--green)',summary:'Appropriates $14.2B for military construction including barracks, base infrastructure, and VA facility modernization.',impact:'POSITIVE — HIGH IMPACT',ic:'var(--green)',ib:'var(--greenDim)',fx:['USACE New Orleans District receives increased funding — expect 30-40% more solicitations Q3 2026','VA VISN 16 (LA/MS) allocated $280M for clinic renovations — direct match to Walker NAICS 236220','Keesler AFB and NAS JRB both listed for facility upgrades — Walker is in the geographic sweet spot','SCOUT reconfigured to increase scan frequency for USACE and VA solicitations']},{bill:'S. 2891 — Federal Supply Chain Resilience Act',status:'PASSED SENATE — HOUSE PENDING',date:'Mar 28, 2026',amount:'$1.8B',sc:'var(--amber)',summary:'Requires agencies to source 30% of consumable supplies from small businesses.',impact:'POSITIVE — SUPPLY VERTICAL',ic:'var(--cyan)',ib:'var(--cyanDim)',fx:['If signed, creates mandatory SDB set-asides on supply contracts under $250K','Janitorial and PPE contracts would see reduced competition','ACQ Scores for SDB supply contracts would increase 10-15 points','House vote expected June 2026']},{bill:'Executive Order 15021 — Buy America Expansion',status:'EFFECTIVE NOW',date:'Feb 15, 2026',amount:'Regulatory',sc:'var(--green)',summary:'Expands domestic content requirements: 75% domestic steel, 65% lumber on all federal construction.',impact:'MIXED — CONSTRUCTION',ic:'var(--amber)',ib:'var(--amberDim)',fx:['Material costs may increase 5-12% on construction bids','BID ENGINE updated with 8% domestic material premium','Competitors using imported materials face compliance issues','VAULT now checks material sourcing compliance']},{bill:'H.R. 7102 — Small Business Contracting Fairness Act',status:'INTRODUCED — COMMITTEE',date:'Apr 3, 2026',amount:'Policy',sc:'var(--t3)',summary:'Proposes raising simplified acquisition threshold from $250K to $500K for small businesses.',impact:'WATCHING — POTENTIALLY HIGH',ic:'var(--violet)',ib:'var(--violetDim)',fx:['If passed, supply contracts up to $500K qualify for simplified acquisition','Increased SB goal (28%) forces agencies to award more to small businesses','Still in committee — RECON monitors weekly','No action needed now']}];

const HELP=[
{id:'H-001',term:'PRIME Score',cat:'Scoring',catC:'var(--cyan)',a:'A number from 0 to 100 that tells you how good a match an opportunity is for your company. It looks at 5 things: does the job match your skills, can you win it, will you make money, is it strategically valuable, and can you actually do it. Higher is better. Above 70 is worth looking at. Above 85 is a strong bid.',agent:'JUDGE'},
{id:'H-002',term:'ACQ Score',cat:'Scoring',catC:'var(--cyan)',a:'Same idea as PRIME Score but for supply contracts. Measures how well a supply opportunity matches your distribution capabilities. Focuses on product availability, margin potential, delivery capability, recurring revenue, and set-aside eligibility.',agent:'JUDGE'},
{id:'H-003',term:'STRONG BID',cat:'Alerts',catC:'var(--green)',a:'This badge appears when an opportunity scores 85 or higher. It means the system thinks this is one of your best chances to win. Prioritize these over everything else.',agent:'JUDGE'},
{id:'H-004',term:'BLOCKED',cat:'Alerts',catC:'var(--red)',a:'You cannot bid on this opportunity right now. Usually because the job requires a certification you do not have (like HUBZone or 8(a)) or a state license you are missing. The system tells you exactly what is blocking you.',agent:'VAULT'},
{id:'H-005',term:'URGENT',cat:'Alerts',catC:'var(--red)',a:'Something needs your attention today. Could be a deadline approaching, a payment issue, a certification expiring, or a decision waiting too long. Handle these first.',agent:'BRANDI'},
{id:'H-006',term:'DECISION AGING',cat:'Alerts',catC:'var(--amber)',a:'An opportunity was scored but you have not decided whether to bid yet. After 48 hours, this warning appears. After 5 days, the opportunity goes stale. Make the call so your pipeline stays clean.',agent:'JUDGE'},
{id:'H-007',term:'STALE',cat:'Alerts',catC:'var(--amber)',a:'Information is outdated. For pricing, it means a supplier quote is more than 14 days old. For opportunities, the data has not been refreshed. Stale data leads to bad decisions.',agent:'SYSTEM'},
{id:'H-008',term:'Retainage',cat:'Money',catC:'var(--green)',a:'When the government pays you for construction work, they hold back 5-10% until the project is done. PRIME tracks the exact amount held and reminds you to request it back when complete.',agent:'EXEC'},
{id:'H-009',term:'Prompt Payment Interest',cat:'Money',catC:'var(--green)',a:'Federal law says the government must pay you within 14 days. If late, they owe you interest. PRIME watches every invoice and tells you when interest is owed so you never leave money on the table.',agent:'EXEC'},
{id:'H-010',term:'Sub Payment Flow-Down',cat:'Money',catC:'var(--green)',a:'When the government pays you, you must pay your subcontractors within 7 days. If late, you can lose the contract. PRIME sets a countdown timer so you never miss the 7-day deadline.',agent:'EXEC'},
{id:'H-011',term:'Set-Aside',cat:'Concepts',catC:'var(--violet)',a:'The government sometimes limits who can bid to help small businesses. Common types: Small Business (SB), Small Disadvantaged Business (SDB), HUBZone, 8(a), WOSB, SDVOSB. If a job is set aside for your type, competition shrinks dramatically.',agent:'VAULT'},
{id:'H-012',term:'NAICS Code',cat:'Concepts',catC:'var(--violet)',a:'A 6-digit number that tells the government what type of work your company does. 236220 = commercial construction. 238210 = electrical. The system only shows you opportunities matching your registered codes.',agent:'SCOUT'},
{id:'H-013',term:'Compliance Matrix',cat:'Features',catC:'var(--cyan)',a:'A table that maps every requirement in a solicitation to where you answered it in your proposal. Proves to the evaluator that you addressed everything. PRIME builds this automatically.',agent:'DRAFT'},
{id:'H-014',term:'Bid Bond',cat:'Compliance',catC:'var(--amber)',a:'A guarantee submitted with your proposal that says you will do the work if you win. Usually 20% of bid price. Your surety company issues it. PRIME detects when one is required and starts the request early.',agent:'VAULT'},
{id:'H-015',term:'CPARS',cat:'Compliance',catC:'var(--amber)',a:'The government\'s official rating system for your work. Ratings stay on record for 3 years and directly impact future bid wins. PRIME checks for new ratings weekly and drafts responses to bad ones.',agent:'RECON'},
{id:'H-016',term:'Davis-Bacon',cat:'Compliance',catC:'var(--amber)',a:'Federal law requiring construction workers on government jobs to be paid at least the prevailing wage rate. You must submit certified payroll reports (WH-347) every week proving correct payment.',agent:'VAULT'},
{id:'H-017',term:'WH-347',cat:'Compliance',catC:'var(--amber)',a:'A government form proving you paid workers the correct wages on a federal job. Must be filed weekly. Getting it wrong costs $10,000+ per mistake. PRIME fills this out automatically using official wage rates.',agent:'EXEC'},
{id:'H-018',term:'Morning Brief',cat:'Features',catC:'var(--cyan)',a:'Every morning at 6 AM CT, Brandi sends you an email with everything you need to know: top opportunities, urgent deadlines, required decisions, certification warnings, and action items.',agent:'BRANDI'},
{id:'H-019',term:'GAO Protest',cat:'Intelligence',catC:'var(--violet)',a:'If you think the government picked the wrong company, you can challenge through the GAO. You only have 10 days. PRIME monitors protests affecting your bids and warns you immediately.',agent:'RECON'},
{id:'H-020',term:'Revenue Concentration',cat:'Intelligence',catC:'var(--violet)',a:'If most of your money comes from one customer, your business is at risk. PRIME tracks where your money comes from and warns you if too much is concentrated so you can diversify.',agent:'LEDGER'},
];
